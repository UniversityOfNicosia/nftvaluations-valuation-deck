<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Valuation Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script data-source-entry type="module" src="/src/main.tsx"></script>
    <script>
      (() => {
        const sourceEntry = document.currentScript.previousElementSibling;
        const entrySrc = sourceEntry?.getAttribute("src");
        const isRawSourcePage = entrySrc === "/src/main.tsx";
        const isGitHubPagesHost = window.location.hostname.endsWith(".github.io");
        const isDocsPath =
          window.location.pathname.endsWith("/docs/") ||
          window.location.pathname.includes("/docs/");

        if (!isRawSourcePage || !isGitHubPagesHost || isDocsPath) {
          return;
        }

        const target = new URL("./docs/", window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
